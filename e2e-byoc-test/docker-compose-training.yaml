# BYOC Training E2E Test Stack -- Local deployment
# Tests LoRA training flow: Client -> Orchestrator -> Adapter -> Proxy -> fal.ai
#
# Usage:
#   FAL_KEY=your-key docker compose -f docker-compose-training.yaml up -d
#   python3 test-training-e2e.py
#   docker compose -f docker-compose-training.yaml down

services:
  orchestrator:
    image: livepeer/go-livepeer:latest
    platform: linux/amd64
    container_name: byoc_train_orch
    restart: unless-stopped
    command: >
      -orchestrator
      -network offchain
      -serviceAddr 0.0.0.0:8935
      -cliAddr 0.0.0.0:7935
      -orchSecret ${ORCH_SECRET:-training-test-secret}
      -v 6
    ports:
      - "18935:8935"
      - "17935:7935"

  serverless-proxy:
    build:
      context: ../../../NaaP/containers/livepeer-serverless-proxy
      dockerfile: Dockerfile
    container_name: byoc_train_proxy
    restart: unless-stopped
    environment:
      PROVIDER: fal-ai
      API_KEY: ${FAL_KEY}
      MODEL_ID: "fal-ai/flux-lora-fast-training"
      PORT: "8080"

  inference-adapter:
    build:
      context: ../../../NaaP/containers/livepeer-inference-adapter
      dockerfile: Dockerfile
    container_name: byoc_train_adapter
    restart: unless-stopped
    environment:
      ORCH_URL: https://byoc_train_orch:8935
      ORCH_SECRET: ${ORCH_SECRET:-training-test-secret}
      BACKEND_URL: http://byoc_train_proxy:8080
      BACKEND_INFERENCE_PATH: /inference
      BACKEND_TIMEOUT: "300"
      TRAINING_TIMEOUT: "3600"
      TRAINING_POLL_INTERVAL: "5"
      ADAPTER_PORT: "9090"
      HEALTH_CHECK_INTERVAL: "5"
      REGISTER_INTERVAL: "15"
      CAPABILITY_NAME: "flux-lora-training"
      CAPACITY: "3"
      PRICE_PER_UNIT: "0"
      PRICE_SCALING: "1"
    ports:
      - "19090:9090"
    depends_on:
      - orchestrator
      - serverless-proxy

networks:
  default:
    name: byoc_training_network
